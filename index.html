<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Dema Hope - Digital Business Card</title>
    
    <meta property="og:title" content="Dema Hope - Digital Business Card" />
    <meta property="og:description" content="Digital Business Card for Dema Hope Real Estate. Elevate your life style ቅንጦት ይገባዎታል." />
    <meta property="og:image" content="https://i.ibb.co/TMPW18jq/5855174764425579512.png" /> 
    <meta property="og:type" content="website" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js" type="module"></script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        .contact-btn {
            transition: all 0.2s;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.06);
        }
        .contact-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        .wave-background {
            background-color: #ffffff; 
            position: relative; 
            overflow: hidden; 
            z-index: 1; 
            border-bottom: 5px solid #3b82f6; 
        }
        .graph-pattern-background { background-color: #ffffff; }
        .strip-decoration {
            position: absolute;
            width: 450px; 
            height: 10px; 
            background-color: #1f2937;
            transform: rotate(-45deg); 
            opacity: 1; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        .strip-ur-1 { top: -100px; right: -150px; z-index: 0; } 
        .strip-ur-2 { top: -60px; right: -110px; z-index: 0; } 
        .strip-ur-3 { top: -20px; right: -70px; z-index: 0; } 
        .strip-ll-1 { bottom: -100px; left: -150px; z-index: 5; } 
        .strip-ll-2 { bottom: -60px; left: -110px; z-index: 5; } 
        .strip-ll-3 { bottom: -20px; left: -70px; z-index: 5; }

        .icon-facebook { background-color: #1877F2; color: white; }
        .icon-linkedin { background-color: #0A66C2; color: white; }
        .icon-telegram { background-color: #26A5E4; color: white; }
        .icon-whatsapp { background-color: #000000; color: white; } 
        .icon-tiktok { background-color: #000000; color: white; } 
        .icon-youtube { background-color: #FF0000; color: white; } 
        .icon-x { background-color: #000000; color: white; }
        .icon-instagram { 
            background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #405ded 90%);
            color: white; 
        } 

        @keyframes rotate {
            0% { transform: scale(1.1) rotate(0deg); }
            100% { transform: scale(1.1) rotate(360deg); } 
        }
        .animate-watermark { animation: rotate 20s linear infinite; }
        .hidden-view { display: none !important; }

        #loadingOverlay {
            position: fixed;
            inset: 0;
            background: rgba(17, 24, 39, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
    </style>
</head>
<body class="min-h-screen bg-gray-900 flex flex-col items-center py-8 px-4">

    <!-- Loading Overlay -->
    <div id="loadingOverlay">
        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-blue-500"></div>
    </div>

    <!-- Floating Auth Toggle -->
    <button id="authBtn" class="fixed top-4 right-4 bg-gray-800 text-white p-2 rounded-full shadow-lg z-50 hover:bg-gray-700">
        <i data-lucide="lock" class="w-5 h-5"></i>
    </button>

    <div id="messageBox" class="fixed top-4 left-1/2 -translate-x-1/2 p-3 bg-gray-100 text-gray-700 rounded-lg text-sm text-center hidden z-[100] transition-all duration-300 shadow-xl"></div>

    <!-- LOGIN SCREEN -->
    <div id="loginView" class="hidden-view max-w-sm w-full bg-white p-8 rounded-3xl shadow-2xl mt-20">
        <div class="flex flex-col items-center mb-6">
            <div class="bg-blue-100 p-3 rounded-full mb-4">
                <i data-lucide="user-check" class="w-8 h-8 text-blue-600"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-800">Admin Access</h2>
            <p class="text-sm text-gray-500">Sign in to edit your digital card</p>
        </div>
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" id="loginPass" class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
            </div>
            <button id="doLogin" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 shadow-lg transition-all active:scale-95">Sign In</button>
            <button onclick="window.toggleView('card')" class="w-full text-gray-500 text-sm py-2 hover:text-gray-700">Go Back to Card</button>
        </div>
    </div>

    <!-- EDIT SCREEN -->
    <div id="editView" class="hidden-view max-w-2xl w-full bg-white p-8 rounded-3xl shadow-2xl my-8">
        <div class="flex justify-between items-center mb-6 border-b pb-4">
            <h2 class="text-2xl font-bold text-gray-800">Edit Profile</h2>
            <button id="logoutBtn" class="bg-red-50 text-red-600 px-4 py-2 rounded-lg font-bold hover:bg-red-100 transition-colors">Logout</button>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Profile Info -->
            <div class="space-y-4">
                <h3 class="font-bold text-blue-600 flex items-center"><i data-lucide="user" class="w-4 h-4 mr-2"></i>Personal Info</h3>
                <div class="p-4 bg-blue-50 rounded-xl border-2 border-dashed border-blue-200">
                    <label class="block text-xs font-semibold uppercase text-gray-400 mb-2">Profile Photo</label>
                    <div class="flex items-center gap-4">
                        <img id="editImgPreview" src="" class="w-16 h-16 rounded-full object-cover border-2 border-white shadow-md">
                        <label for="imageUpload" class="cursor-pointer bg-blue-600 text-white px-3 py-2 rounded-lg text-sm font-bold hover:bg-blue-700">
                            Change Photo
                        </label>
                        <input type="file" id="imageUpload" accept="image/*" class="hidden">
                    </div>
                </div>
                <div><label class="block text-xs font-semibold uppercase text-gray-400">Full Name</label><input type="text" id="editName" class="w-full p-2 border rounded-lg"></div>
                <div><label class="block text-xs font-semibold uppercase text-gray-400">Organization</label><input type="text" id="editOrg" class="w-full p-2 border rounded-lg"></div>
                <div><label class="block text-xs font-semibold uppercase text-gray-400">Job Title</label><input type="text" id="editTitle" class="w-full p-2 border rounded-lg"></div>
            </div>

            <!-- Contact Links -->
            <div class="space-y-4">
                <h3 class="font-bold text-blue-600 flex items-center"><i data-lucide="phone" class="w-4 h-4 mr-2"></i>Contact Details</h3>
                <div><label class="block text-xs font-semibold uppercase text-gray-400">Primary Phone</label><input type="text" id="editPhone" class="w-full p-2 border rounded-lg"></div>
                <div><label class="block text-xs font-semibold uppercase text-gray-400">Secondary Phone</label><input type="text" id="editPhone2" class="w-full p-2 border rounded-lg"></div>
                <div><label class="block text-xs font-semibold uppercase text-gray-400">Email Address</label><input type="email" id="editEmail" class="w-full p-2 border rounded-lg"></div>
                <div><label class="block text-xs font-semibold uppercase text-gray-400">WhatsApp Number</label><input type="text" id="editWhatsapp" class="w-full p-2 border rounded-lg"></div>
                <div><label class="block text-xs font-semibold uppercase text-gray-400">Website URL</label><input type="text" id="editWebsite" class="w-full p-2 border rounded-lg"></div>
                <div><label class="block text-xs font-semibold uppercase text-gray-400">Location URL</label><input type="text" id="editLocation" class="w-full p-2 border rounded-lg"></div>
            </div>

            <!-- Custom Additional Links -->
            <div class="space-y-4 md:col-span-2 border-t pt-4 bg-blue-50 p-4 rounded-xl">
                <h3 class="font-bold text-blue-700 flex items-center"><i data-lucide="link" class="w-4 h-4 mr-2"></i>Custom Links</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="block text-xs font-semibold text-gray-500">Link 1 Label</label>
                        <input type="text" id="editCustomLabel1" class="w-full p-2 border rounded-lg" placeholder="e.g. Portfolio">
                        <label class="block text-xs font-semibold text-gray-500">Link 1 URL</label>
                        <input type="text" id="editCustomUrl1" class="w-full p-2 border rounded-lg" placeholder="https://...">
                    </div>
                    <div class="space-y-2">
                        <label class="block text-xs font-semibold text-gray-500">Link 2 Label</label>
                        <input type="text" id="editCustomLabel2" class="w-full p-2 border rounded-lg" placeholder="e.g. Catalogue">
                        <label class="block text-xs font-semibold text-gray-500">Link 2 URL</label>
                        <input type="text" id="editCustomUrl2" class="w-full p-2 border rounded-lg" placeholder="https://...">
                    </div>
                </div>
            </div>

            <!-- Social Media Extended -->
            <div class="space-y-4 md:col-span-2 border-t pt-4">
                <h3 class="font-bold text-purple-600 flex items-center"><i data-lucide="share-2" class="w-4 h-4 mr-2"></i>Social Media Links</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div><label class="block text-xs font-semibold text-gray-500">LinkedIn</label><input type="text" id="editLinkedin" class="w-full p-2 border rounded-lg"></div>
                    <div><label class="block text-xs font-semibold text-gray-500">Instagram</label><input type="text" id="editInstagram" class="w-full p-2 border rounded-lg"></div>
                    <div><label class="block text-xs font-semibold text-gray-500">Facebook</label><input type="text" id="editFacebook" class="w-full p-2 border rounded-lg"></div>
                    <div><label class="block text-xs font-semibold text-gray-500">TikTok</label><input type="text" id="editTiktok" class="w-full p-2 border rounded-lg"></div>
                    <div><label class="block text-xs font-semibold text-gray-500">Telegram</label><input type="text" id="editTelegram" class="w-full p-2 border rounded-lg"></div>
                    <div><label class="block text-xs font-semibold text-gray-500">YouTube</label><input type="text" id="editYoutube" class="w-full p-2 border rounded-lg"></div>
                </div>
            </div>

            <!-- Security Section -->
            <div class="space-y-4 md:col-span-2 border-t pt-4 bg-gray-50 p-4 rounded-xl">
                <h3 class="font-bold text-red-600 flex items-center"><i data-lucide="shield-check" class="w-4 h-4 mr-2"></i>Security</h3>
                <div>
                    <label class="block text-xs font-semibold text-gray-500">Change Admin Password</label>
                    <input type="password" id="editPassword" class="w-full p-2 border rounded-lg" placeholder="Enter new password">
                </div>
            </div>
        </div>

        <div class="mt-8 pt-6 border-t flex gap-4">
            <button id="saveEdit" class="flex-1 bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 shadow-lg active:scale-95 transition-all">Save All Changes</button>
            <button onclick="window.toggleView('card')" class="flex-1 bg-gray-100 text-gray-600 py-4 rounded-xl font-bold hover:bg-gray-200 transition-all">Cancel</button>
        </div>
    </div>

    <!-- CARD VIEW -->
    <div id="cardView" class="w-full flex flex-col items-center">
        <div id="id-card-content" class="graph-pattern-background max-w-sm w-full mx-auto p-4 md:p-6 rounded-3xl border-2 border-gray-200 shadow-2xl relative overflow-hidden mb-6">
            
            <div class="wave-background absolute top-0 left-0 right-0 h-64 -mt-2 -mx-1 rounded-t-[1.5rem]">
                <div class="absolute top-0 left-0 w-full h-full flex justify-center items-center">
                    <img id="businessLogo" src="https://i.ibb.co/TMPW18jq/5855174764425579512.png" alt="Logo" class="w-[90%] h-[90%] object-contain">
                </div>
            </div>

            <!-- Watermark -->
            <div class="absolute inset-0 z-0 pointer-events-none flex justify-center items-center" style="top: -5%;">
                <div class="absolute opacity-[0.30] animate-watermark w-full h-full flex justify-center items-center">
                    <img src="https://i.ibb.co/FLxSS6jt/5855174764425579514-1-removebg-preview.png" alt="Watermark" class="w-full h-full object-contain">
                </div>
            </div>

            <div class="strip-decoration strip-ur-1"></div><div class="strip-decoration strip-ur-2"></div><div class="strip-decoration strip-ur-3"></div>
            <div class="strip-decoration strip-ll-1"></div><div class="strip-decoration strip-ll-2"></div><div class="strip-decoration strip-ll-3"></div>

            <div class="relative z-10 pt-40"> 
                <div class="text-center mb-6"> 
                    <div class="relative w-40 h-40 mx-auto rounded-full border-8 border-black/60 shadow-xl overflow-hidden profile-container">
                        <img id="profilePicture" src="https://i.ibb.co/KxdB41Yw/590330395-122245334552174394-7170724954983779927-n.jpg" alt="Profile" class="w-full h-full rounded-full object-cover">
                    </div>
                    
                    <h1 id="display-name" class="text-xl font-extrabold text-gray-900 mt-4">Dema Hope</h1>
                    <p id="display-org" class="text-xl font-semibold text-blue-600 mt-1">Dema Hope real estate</p>
                    <p id="display-title" class="text-lg font-bold text-gray-900 mt-2">Chief Executive Officer</p>
                    <p class="text-base italic text-gray-700 mt-1">Elevate your life style | ቅንጦት ይገባዎታል</p>
                </div>

                <!-- SOCIAL ICONS -->
                <div class="mt-4 border-t border-b py-4">
                    <div id="social-container" class="flex flex-wrap justify-center gap-4 py-2"> 
                    </div>
                </div>

                <!-- CONTACT GRID -->
                <div id="contact-buttons-container" class="space-y-3 mt-6"></div>

                <!-- CUSTOM/DYNAMIC LINKS CONTAINER -->
                <div id="custom-links-container" class="mt-3 space-y-3"></div>

                <div class="mt-6 border-t pt-4 border-gray-200">
                    <div class="grid grid-cols-1 gap-3">
                        <a href="#" target="_blank" id="btn-website" class="contact-btn flex items-center justify-center p-3 bg-gray-200 text-gray-800 font-semibold rounded-lg hover:bg-gray-300">
                            <i data-lucide="globe" class="w-5 h-5 mr-2"></i>Website
                        </a>
                        <a href="#" target="_blank" id="btn-location" class="contact-btn flex items-center justify-center p-3 bg-gray-200 text-gray-800 font-semibold rounded-lg hover:bg-gray-300">
                            <i data-lucide="map-pin" class="w-5 h-5 mr-2"></i>Location
                        </a>
                    </div>
                </div>

                <div class="mt-8 space-y-3">
                    <button id="downloadButton" class="w-full flex items-center justify-center p-4 bg-blue-600 text-white font-bold rounded-xl shadow-xl hover:bg-blue-700">
                        <i data-lucide="download" class="w-6 h-6 mr-2"></i>Download Card
                    </button>
                    <button id="vcfButton" class="w-full flex items-center justify-center p-4 bg-black text-white font-bold rounded-xl shadow-xl hover:bg-gray-800">
                        <i data-lucide="address-book" class="w-6 h-6 mr-2"></i>Save Contact (.vcf)
                    </button>
                </div>
            </div> 
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, doc, getDoc, setDoc, onSnapshot, collection } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        // Firebase Config
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'dema-hope-card';

        // State
        let CONTACT_DATA = {
            adminPassword: "Admin",
            name: "Dema Hope",
            organization: "Dema Hope real estate", 
            title: "Chief Executive Officer",
            image: "https://i.ibb.co/KxdB41Yw/590330395-122245334552174394-7170724954983779927-n.jpg",
            phone: "+251951515174",
            phone2: "",
            email: "contact@demahope.com",
            whatsapp: "251951515111",
            website: "https://demahoperealestate.com/",
            location: "https://maps.app.goo.gl/66vQJ5azkoYCMTHJA",
            customLinks: [
                { label: "", url: "" },
                { label: "", url: "" }
            ],
            socials: {
                linkedin: "https://et.linkedin.com/company/demahoperealestate",
                instagram: "https://www.instagram.com/demahoperealestate",
                facebook: "https://www.facebook.com/demahoperealestatee",
                tiktok: "https://vm.tiktok.com/ZMHTSWFmNKxNR-PNDd6/",
                telegram: "https://t.me/demahope",
                youtube: ""
            }
        };

        let currentUser = null;
        let tempImageBase64 = null;

        const SOCIAL_MAP = {
            linkedin: { icon: 'fa-linkedin', class: 'icon-linkedin' },
            instagram: { icon: 'fa-instagram', class: 'icon-instagram' },
            facebook: { icon: 'fa-facebook', class: 'icon-facebook' },
            tiktok: { icon: 'fa-tiktok', class: 'icon-tiktok' },
            telegram: { icon: 'fa-telegram', class: 'icon-telegram' },
            youtube: { icon: 'fa-youtube', class: 'icon-youtube' }
        };

        // UI Helpers
        window.toggleView = (view) => {
            document.querySelectorAll('#cardView, #loginView, #editView').forEach(v => v.classList.add('hidden-view'));
            if (view === 'login') {
                currentUser ? window.toggleView('edit') : document.getElementById('loginView').classList.remove('hidden-view');
            } else if (view === 'edit') {
                document.getElementById('editView').classList.remove('hidden-view');
                loadEditForm();
            } else {
                document.getElementById('cardView').classList.remove('hidden-view');
            }
            window.scrollTo(0,0);
        };

        function showMessage(text, isError = false) {
            const messageBox = document.getElementById('messageBox');
            messageBox.textContent = text;
            messageBox.className = 'fixed top-4 left-1/2 -translate-x-1/2 p-3 rounded-lg text-sm font-semibold text-center z-[100] shadow-2xl ' + (isError ? 'bg-red-600 text-white' : 'bg-green-600 text-white');
            messageBox.classList.remove('hidden');
            setTimeout(() => messageBox.classList.add('hidden'), 3000);
        }

        // Auth Logic - Correcting path segments
        const initAuth = async () => {
          if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
            await signInWithCustomToken(auth, __initial_auth_token);
          } else {
            await signInAnonymously(auth);
          }
        };
        initAuth();

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                // Correct path segments as per MANDATORY RULE 1: /artifacts/{appId}/public/data/{collectionName}/{docId}
                // segments: 1:artifacts, 2:appId, 3:public, 4:data, 5:profile, 6:main
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'profile', 'main');
                
                onSnapshot(docRef, (docSnap) => {
                    if (docSnap.exists()) {
                        CONTACT_DATA = { ...CONTACT_DATA, ...docSnap.data() };
                    }
                    updateCardUI();
                    document.getElementById('loadingOverlay').classList.add('hidden-view');
                }, (error) => {
                    console.error("Snapshot error:", error);
                    updateCardUI(); // Fallback to default
                    document.getElementById('loadingOverlay').classList.add('hidden-view');
                });
            }
        });

        document.getElementById('doLogin').addEventListener('click', () => {
            if (document.getElementById('loginPass').value === CONTACT_DATA.adminPassword) {
                window.toggleView('edit');
                document.getElementById('loginPass').value = "";
            } else showMessage("Incorrect password.", true);
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            window.toggleView('card');
        });

        document.getElementById('authBtn').addEventListener('click', () => window.toggleView('login'));

        // Form Logic
        function loadEditForm() {
            document.getElementById('editName').value = CONTACT_DATA.name;
            document.getElementById('editOrg').value = CONTACT_DATA.organization;
            document.getElementById('editTitle').value = CONTACT_DATA.title;
            document.getElementById('editImgPreview').src = CONTACT_DATA.image;
            tempImageBase64 = CONTACT_DATA.image;
            document.getElementById('editPhone').value = CONTACT_DATA.phone;
            document.getElementById('editPhone2').value = CONTACT_DATA.phone2;
            document.getElementById('editEmail').value = CONTACT_DATA.email;
            document.getElementById('editWhatsapp').value = CONTACT_DATA.whatsapp;
            document.getElementById('editWebsite').value = CONTACT_DATA.website;
            document.getElementById('editLocation').value = CONTACT_DATA.location;
            document.getElementById('editPassword').value = CONTACT_DATA.adminPassword;
            
            document.getElementById('editCustomLabel1').value = CONTACT_DATA.customLinks[0]?.label || "";
            document.getElementById('editCustomUrl1').value = CONTACT_DATA.customLinks[0]?.url || "";
            document.getElementById('editCustomLabel2').value = CONTACT_DATA.customLinks[1]?.label || "";
            document.getElementById('editCustomUrl2').value = CONTACT_DATA.customLinks[1]?.url || "";

            Object.keys(SOCIAL_MAP).forEach(key => {
                const inputId = 'edit' + key.charAt(0).toUpperCase() + key.slice(1);
                document.getElementById(inputId).value = CONTACT_DATA.socials[key] || "";
            });
        }

        document.getElementById('imageUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                if (file.size > 800000) { 
                    showMessage("Image too large. Please use a smaller file.", true);
                    return;
                }
                const reader = new FileReader();
                reader.onload = e => {
                    tempImageBase64 = e.target.result;
                    document.getElementById('editImgPreview').src = tempImageBase64;
                };
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('saveEdit').addEventListener('click', async () => {
            if (!currentUser) return;
            
            document.getElementById('loadingOverlay').classList.remove('hidden-view');
            
            const newData = {
                name: document.getElementById('editName').value,
                organization: document.getElementById('editOrg').value,
                title: document.getElementById('editTitle').value,
                image: tempImageBase64 || CONTACT_DATA.image,
                phone: document.getElementById('editPhone').value,
                phone2: document.getElementById('editPhone2').value,
                email: document.getElementById('editEmail').value,
                whatsapp: document.getElementById('editWhatsapp').value,
                website: document.getElementById('editWebsite').value,
                location: document.getElementById('editLocation').value,
                adminPassword: document.getElementById('editPassword').value.trim() || CONTACT_DATA.adminPassword,
                customLinks: [
                    { label: document.getElementById('editCustomLabel1').value, url: document.getElementById('editCustomUrl1').value },
                    { label: document.getElementById('editCustomLabel2').value, url: document.getElementById('editCustomUrl2').value }
                ],
                socials: {}
            };

            Object.keys(SOCIAL_MAP).forEach(key => {
                const inputId = 'edit' + key.charAt(0).toUpperCase() + key.slice(1);
                newData.socials[key] = document.getElementById(inputId).value.trim();
            });

            try {
                // Correct path segments as per MANDATORY RULE 1
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'profile', 'main');
                await setDoc(docRef, newData);
                showMessage("Settings Saved Permanently!");
                window.toggleView('card');
            } catch (e) {
                showMessage("Failed to save. Check your connection.", true);
                console.error(e);
            } finally {
                document.getElementById('loadingOverlay').classList.add('hidden-view');
            }
        });

        // UI Rendering
        function updateCardUI() {
            document.getElementById('display-name').innerText = CONTACT_DATA.name;
            document.getElementById('display-org').innerText = CONTACT_DATA.organization;
            document.getElementById('display-title').innerText = CONTACT_DATA.title;
            document.getElementById('profilePicture').src = CONTACT_DATA.image;
            document.getElementById('btn-website').href = CONTACT_DATA.website;
            document.getElementById('btn-location').href = CONTACT_DATA.location;
            
            const btnContainer = document.getElementById('contact-buttons-container');
            btnContainer.innerHTML = "";

            if(CONTACT_DATA.phone) {
                btnContainer.innerHTML += `<a href="tel:${CONTACT_DATA.phone}" class="contact-btn flex items-center justify-center p-3 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700"><i data-lucide="phone" class="w-5 h-5 mr-2"></i>Call: ${CONTACT_DATA.phone}</a>`;
            }
            if(CONTACT_DATA.phone2) {
                btnContainer.innerHTML += `<a href="tel:${CONTACT_DATA.phone2}" class="contact-btn flex items-center justify-center p-3 bg-indigo-600 text-white font-semibold rounded-lg hover:bg-indigo-700"><i data-lucide="phone-forwarded" class="w-5 h-5 mr-2"></i>Call: ${CONTACT_DATA.phone2}</a>`;
            }
            if(CONTACT_DATA.email) {
                btnContainer.innerHTML += `<a href="mailto:${CONTACT_DATA.email}" class="contact-btn flex items-center justify-center p-3 bg-red-600 text-white font-semibold rounded-lg hover:bg-red-700"><i data-lucide="mail" class="w-5 h-5 mr-2"></i>Send Email</a>`;
            }
            if(CONTACT_DATA.whatsapp) {
                btnContainer.innerHTML += `<a href="https://wa.me/${CONTACT_DATA.whatsapp}" target="_blank" class="contact-btn flex items-center justify-center p-3 font-semibold rounded-lg shadow-lg icon-whatsapp"><i class="fa-brands fa-whatsapp text-2xl mr-2"></i>WhatsApp</a>`;
            }

            const customContainer = document.getElementById('custom-links-container');
            customContainer.innerHTML = "";
            CONTACT_DATA.customLinks?.forEach(link => {
                if (link.label && link.url) {
                    customContainer.innerHTML += `
                        <a href="${link.url}" target="_blank" class="contact-btn flex items-center justify-center p-3 bg-white text-blue-600 border-2 border-blue-600 font-bold rounded-lg hover:bg-blue-50">
                            <i data-lucide="external-link" class="w-5 h-5 mr-2"></i>${link.label}
                        </a>`;
                }
            });
            
            const socialContainer = document.getElementById('social-container');
            socialContainer.innerHTML = "";
            Object.keys(SOCIAL_MAP).forEach(key => {
                const link = CONTACT_DATA.socials[key];
                if (link) {
                    const btn = document.createElement('a');
                    btn.href = link;
                    btn.target = "_blank";
                    btn.className = `inline-flex items-center justify-center w-12 h-12 rounded-full transition duration-300 transform hover:scale-110 shadow-lg ${SOCIAL_MAP[key].class}`;
                    btn.innerHTML = `<i class="fa-brands ${SOCIAL_MAP[key].icon} text-2xl"></i>`;
                    socialContainer.appendChild(btn);
                }
            });

            lucide.createIcons();
        }

        // Action Buttons
        document.getElementById('downloadButton').addEventListener('click', () => {
            const el = document.getElementById('id-card-content');
            const authBtn = document.getElementById('authBtn');
            authBtn.style.display = 'none';
            html2canvas(el, { scale: 2, useCORS: true, allowTaint: true }).then(canvas => {
                authBtn.style.display = 'block';
                const link = document.createElement('a');
                link.download = `Card_${CONTACT_DATA.name}.png`;
                link.href = canvas.toURL();
                link.click();
            });
        });

        document.getElementById('vcfButton').addEventListener('click', () => {
            let vcf = `BEGIN:VCARD\nVERSION:3.0\nFN:${CONTACT_DATA.name}\nORG:${CONTACT_DATA.organization}\nTEL;TYPE=CELL:${CONTACT_DATA.phone}\nTEL;TYPE=WORK:${CONTACT_DATA.phone2}\nEMAIL:${CONTACT_DATA.email}\nURL:${CONTACT_DATA.website}\nEND:VCARD`;
            const blob = new Blob([vcf], { type: 'text/vcard' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `${CONTACT_DATA.name}.vcf`;
            link.click();
        });

        // Initialize UI
        updateCardUI();
    </script>
</body>
</html>
