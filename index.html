<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Dema Hope - Digital Business Card</title>
    
    <meta property="og:title" content="Dema Hope - Digital Business Card" />
    <meta property="og:description" content="Digital Business Card for Dema Hope Real Estate. Elevate your life style ቅንጦት ይገባዎታል." />
    <meta property="og:image" content="https://i.ibb.co/TMPW18jq/5855174764425579512.png" /> 
    <meta property="og:type" content="website" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .contact-btn { transition: all 0.2s; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .contact-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .wave-background { background-color: #ffffff; position: relative; overflow: hidden; z-index: 1; border-bottom: 5px solid #3b82f6; }
        .graph-pattern-background { background-color: #ffffff; background-image: radial-gradient(#e5e7eb 1px, transparent 1px); background-size: 20px 20px; }
        .strip-decoration { position: absolute; width: 450px; height: 10px; background-color: #1f2937; transform: rotate(-45deg); opacity: 1; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .strip-ur-1 { top: -100px; right: -150px; z-index: 0; } 
        .strip-ur-2 { top: -60px; right: -110px; z-index: 0; } 
        .strip-ll-1 { bottom: -100px; left: -150px; z-index: 5; } 
        .strip-ll-2 { bottom: -60px; left: -110px; z-index: 5; }
        
        .icon-facebook { background-color: #1877F2; color: white; }
        .icon-linkedin { background-color: #0A66C2; color: white; }
        .icon-telegram { background-color: #26A5E4; color: white; }
        .icon-whatsapp { background-color: #25D366; color: white; } 
        .icon-tiktok { background-color: #000000; color: white; } 
        .icon-youtube { background-color: #FF0000; color: white; } 
        .icon-instagram { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #405ded 90%); color: white; } 
        .icon-x-twitter { background-color: #000000; color: white; }
        
        @keyframes rotate { 0% { transform: scale(1.1) rotate(0deg); } 100% { transform: scale(1.1) rotate(360deg); } }
        .animate-watermark { animation: rotate 20s linear infinite; }
        .hidden-view { display: none !important; }
        #loadingOverlay { position: fixed; inset: 0; background: #111827; display: flex; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.3s; }
    </style>
</head>
<body class="min-h-screen bg-gray-900 flex flex-col items-center py-8 px-4">

    <div id="loadingOverlay">
        <div class="flex flex-col items-center gap-4">
            <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-blue-500"></div>
            <p class="text-white text-sm font-medium">Loading Card...</p>
        </div>
    </div>

    <button id="authBtn" class="fixed top-4 right-4 bg-gray-800/80 backdrop-blur-sm text-white p-2 rounded-full shadow-lg z-50 hover:bg-gray-700">
        <i data-lucide="lock" class="w-5 h-5"></i>
    </button>

    <!-- Login View -->
    <div id="loginView" class="hidden-view max-w-sm w-full bg-white p-8 rounded-3xl shadow-2xl mt-20">
        <div class="flex flex-col items-center mb-6">
            <div class="bg-blue-100 p-3 rounded-full mb-4">
                <i data-lucide="user-check" class="w-8 h-8 text-blue-600"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-800">Admin Access</h2>
        </div>
        <div class="space-y-4">
            <input type="password" id="loginPass" placeholder="Password" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
            <button id="doLogin" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold shadow-lg">Sign In</button>
            <button onclick="window.toggleView('card')" class="w-full text-gray-500 text-sm">Cancel</button>
        </div>
    </div>

    <!-- Edit View -->
    <div id="editView" class="hidden-view max-w-4xl w-full bg-white p-8 rounded-3xl shadow-2xl my-8 overflow-y-auto max-h-[90vh]">
        <div class="flex justify-between items-center mb-6 border-b pb-4">
            <h2 class="text-2xl font-bold text-gray-800">Edit Profile</h2>
            <button id="logoutBtn" class="bg-red-50 text-red-600 px-4 py-2 rounded-lg font-bold">Close</button>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="space-y-4">
                <h3 class="font-bold text-blue-600 border-b pb-1 flex items-center gap-2"><i data-lucide="user" class="w-4 h-4"></i> Identity</h3>
                <div class="space-y-3">
                    <label class="block text-xs font-bold uppercase text-gray-400">Profile Image</label>
                    <div class="flex items-center gap-4 p-2 bg-gray-50 rounded-lg">
                        <img id="editImagePreview" src="" class="w-16 h-16 rounded-full object-cover border-2 border-white shadow-sm bg-gray-200">
                        <input type="file" id="imageUpload" accept="image/*" class="w-full text-xs">
                    </div>
                    <input type="text" id="editName" placeholder="Full Name" class="w-full p-2 border rounded">
                    <input type="text" id="editOrg" placeholder="Organization" class="w-full p-2 border rounded">
                    <input type="text" id="editTitle" placeholder="Job Title" class="w-full p-2 border rounded">
                    <input type="email" id="editEmail" placeholder="Email Address" class="w-full p-2 border rounded">
                    <input type="text" id="editWebsite" placeholder="Website URL" class="w-full p-2 border rounded">
                    <input type="text" id="editLocation" placeholder="Google Maps URL" class="w-full p-2 border rounded">
                </div>

                <div class="pt-4">
                    <label class="block text-xs font-bold uppercase text-gray-400 mb-2">Admin Password</label>
                    <input type="password" id="editPassword" placeholder="Admin Password" class="w-full p-2 border rounded">
                </div>
            </div>

            <div class="space-y-6">
                <div>
                    <div class="flex justify-between items-center border-b pb-1 mb-3">
                        <h3 class="font-bold text-blue-600 flex items-center gap-2"><i data-lucide="phone" class="w-4 h-4"></i> Phone Numbers</h3>
                        <button id="addPhone" class="text-blue-600 text-xs font-bold hover:underline">+ ADD</button>
                    </div>
                    <div id="phonesEditor" class="space-y-2"></div>
                </div>

                <div>
                    <div class="flex justify-between items-center border-b pb-1 mb-3">
                        <h3 class="font-bold text-blue-600 flex items-center gap-2"><i data-lucide="share-2" class="w-4 h-4"></i> Social Media</h3>
                        <button id="addSocial" class="text-blue-600 text-xs font-bold hover:underline">+ ADD</button>
                    </div>
                    <div id="socialsEditor" class="space-y-2"></div>
                </div>

                <div>
                    <div class="flex justify-between items-center border-b pb-1 mb-3">
                        <h3 class="font-bold text-blue-600 flex items-center gap-2"><i data-lucide="link" class="w-4 h-4"></i> Custom Buttons</h3>
                        <button id="addCustomLink" class="text-blue-600 text-xs font-bold hover:underline">+ ADD</button>
                    </div>
                    <div id="customLinksEditor" class="space-y-2"></div>
                </div>
            </div>
        </div>

        <button id="saveEdit" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold mt-8 shadow-xl hover:bg-blue-700 transition-colors">Save All Changes</button>
    </div>

    <!-- Card View -->
    <div id="cardView" class="w-full flex flex-col items-center">
        <div id="id-card-content" class="graph-pattern-background max-w-sm w-full mx-auto p-4 md:p-6 rounded-3xl border-2 border-gray-200 shadow-2xl relative overflow-hidden mb-6">
            <div class="wave-background absolute top-0 left-0 right-0 h-64 -mt-2 -mx-1 rounded-t-[1.5rem]">
                <div class="absolute top-0 left-0 w-full h-full flex justify-center items-center p-4">
                    <img id="businessLogo" src="https://i.ibb.co/TMPW18jq/5855174764425579512.png" alt="Logo" class="w-full h-full object-contain">
                </div>
            </div>
            
            <div class="absolute inset-0 z-0 pointer-events-none flex justify-center items-center" style="top: -5%;">
                <div class="absolute opacity-[0.2] animate-watermark w-full h-full flex justify-center items-center">
                    <img src="https://i.ibb.co/FLxSS6jt/5855174764425579514-1-removebg-preview.png" alt="Watermark" class="w-full h-full object-contain">
                </div>
            </div>

            <div class="strip-decoration strip-ur-1"></div><div class="strip-decoration strip-ur-2"></div>
            <div class="strip-decoration strip-ll-1"></div><div class="strip-decoration strip-ll-2"></div>

            <div class="relative z-10 pt-40"> 
                <div class="text-center mb-6"> 
                    <div class="relative w-36 h-36 mx-auto rounded-full border-4 border-black/80 shadow-xl overflow-hidden bg-white">
                        <img id="profilePicture" src="https://i.ibb.co/KxdB41Yw/590330395-122245334552174394-7170724954983779927-n.jpg" alt="Profile" class="w-full h-full object-cover">
                    </div>
                    <h1 id="display-name" class="text-xl font-extrabold text-gray-900 mt-4">...</h1>
                    <p id="display-org" class="text-lg font-bold text-blue-600">...</p>
                    <p id="display-title" class="text-md font-semibold text-gray-800">...</p>
                    <p class="text-sm italic text-gray-600 mt-1">Elevate your life style | ቅንጦት ይገባዎታል</p>
                </div>

                <div class="mt-4 border-t border-b py-4">
                    <div id="social-container" class="flex flex-wrap justify-center gap-3"></div>
                </div>

                <div id="phone-buttons-container" class="space-y-3 mt-6"></div>
                <div id="contact-buttons-container" class="space-y-3 mt-3"></div>
                <div id="custom-links-container" class="space-y-3 mt-3"></div>

                <div class="mt-6 flex gap-2">
                    <a href="#" target="_blank" id="btn-website" class="flex-1 flex items-center justify-center p-3 bg-gray-100 rounded-lg text-sm font-bold"><i data-lucide="globe" class="w-4 h-4 mr-2"></i>Website</a>
                    <a href="#" target="_blank" id="btn-location" class="flex-1 flex items-center justify-center p-3 bg-gray-100 rounded-lg text-sm font-bold"><i data-lucide="map-pin" class="w-4 h-4 mr-2"></i>Location</a>
                </div>

                <div class="mt-8 space-y-3">
                    <button id="downloadButton" class="w-full flex items-center justify-center p-4 bg-blue-600 text-white font-bold rounded-xl shadow-lg hover:bg-blue-700 transition-colors">Download Card</button>
                    <button id="vcfButton" class="w-full flex items-center justify-center p-4 bg-black text-white font-bold rounded-xl shadow-lg hover:bg-gray-900 transition-colors">Save Contact</button>
                </div>
            </div> 
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, doc, setDoc, onSnapshot, getDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        // PLACE YOUR FIREBASE CONFIG HERE TO SAVE PERMANENTLY ACROSS DEVICES
        const firebaseConfig = {
            apiKey: "",
            authDomain: "",
            projectId: "",
            storageBucket: "",
            messagingSenderId: "",
            appId: ""
        };

        let app, auth, db;
        const appIdPrefix = "dema-hope-card-v1"; // Unique key for your card

        let CONTACT_DATA = {
            adminPassword: "Admin",
            name: "Dema Hope",
            organization: "Dema Hope real estate", 
            title: "Chief Executive Officer",
            image: "https://i.ibb.co/KxdB41Yw/590330395-122245334552174394-7170724954983779927-n.jpg",
            phones: ["+251951515174"],
            email: "contact@demahope.com",
            website: "https://demahoperealestate.com/",
            location: "https://maps.app.goo.gl/66vQJ5azkoYCMTHJA",
            socialLinks: [
                { platform: 'linkedin', url: 'https://et.linkedin.com/company/demahoperealestate' },
                { platform: 'instagram', url: 'https://www.instagram.com/demahoperealestate' },
                { platform: 'facebook', url: 'https://www.facebook.com/demahoperealestatee' },
                { platform: 'tiktok', url: 'https://vm.tiktok.com/ZMHTSWFmNKxNR-PNDd6/' },
                { platform: 'telegram', url: 'https://t.me/demahope' }
            ],
            customLinks: []
        };

        const PLATFORMS = {
            linkedin: { label: 'LinkedIn', icon: 'fa-linkedin', class: 'icon-linkedin' },
            instagram: { label: 'Instagram', icon: 'fa-instagram', class: 'icon-instagram' },
            facebook: { label: 'Facebook', icon: 'fa-facebook', class: 'icon-facebook' },
            tiktok: { label: 'TikTok', icon: 'fa-tiktok', class: 'icon-tiktok' },
            telegram: { label: 'Telegram', icon: 'fa-telegram', class: 'icon-telegram' },
            youtube: { label: 'YouTube', icon: 'fa-youtube', class: 'icon-youtube' },
            whatsapp: { label: 'WhatsApp', icon: 'fa-whatsapp', class: 'icon-whatsapp' },
            x: { label: 'X (Twitter)', icon: 'fa-x-twitter', class: 'icon-x-twitter' }
        };

        function updateCardUI() {
            document.getElementById('display-name').textContent = CONTACT_DATA.name;
            document.getElementById('display-org').textContent = CONTACT_DATA.organization;
            document.getElementById('display-title').textContent = CONTACT_DATA.title;
            document.getElementById('profilePicture').src = CONTACT_DATA.image;
            document.getElementById('btn-website').href = CONTACT_DATA.website || '#';
            document.getElementById('btn-location').href = CONTACT_DATA.location || '#';
            
            const phoneContainer = document.getElementById('phone-buttons-container');
            phoneContainer.innerHTML = (CONTACT_DATA.phones || []).map(num => num.trim() ? `
                <a href="tel:${num.trim()}" class="contact-btn flex items-center justify-center p-3 bg-blue-600 text-white font-semibold rounded-lg">
                    <i data-lucide="phone" class="w-5 h-5 mr-2"></i>Call: ${num.trim()}
                </a>
            ` : "").join('');

            const btnContainer = document.getElementById('contact-buttons-container');
            btnContainer.innerHTML = CONTACT_DATA.email ? `<a href="mailto:${CONTACT_DATA.email}" class="contact-btn flex items-center justify-center p-3 bg-red-600 text-white font-semibold rounded-lg"><i data-lucide="mail" class="w-5 h-5 mr-2"></i>Send Email</a>` : "";

            const customLinksContainer = document.getElementById('custom-links-container');
            customLinksContainer.innerHTML = (CONTACT_DATA.customLinks || []).map(link => `
                <a href="${link.url}" target="_blank" class="contact-btn flex items-center justify-center p-3 bg-gray-800 text-white font-semibold rounded-lg">
                    <i data-lucide="external-link" class="w-5 h-5 mr-2 text-blue-400"></i>${link.label}
                </a>
            `).join('');

            const socialContainer = document.getElementById('social-container');
            socialContainer.innerHTML = (CONTACT_DATA.socialLinks || []).map(social => {
                const p = PLATFORMS[social.platform];
                if (!p || !social.url) return "";
                return `<a href="${social.url}" target="_blank" class="w-10 h-10 flex items-center justify-center rounded-full shadow-md ${p.class} transform hover:scale-110 transition-transform"><i class="fa-brands ${p.icon} text-xl"></i></a>`;
            }).join('');

            lucide.createIcons();
            document.getElementById('loadingOverlay').style.display = 'none';
        }

        // Initialize App
        if (firebaseConfig.apiKey) {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);

            signInAnonymously(auth).then(() => {
                const docRef = doc(db, 'profiles', appIdPrefix);
                onSnapshot(docRef, (snap) => {
                    if (snap.exists()) {
                        CONTACT_DATA = snap.data();
                        updateCardUI();
                    } else {
                        // First time setup - save defaults
                        setDoc(docRef, CONTACT_DATA);
                        updateCardUI();
                    }
                });
            }).catch(e => {
                console.error("Firebase auth failed:", e);
                updateCardUI();
            });
        } else {
            // Local mode fallback
            const saved = localStorage.getItem('dema_hope_local_storage');
            if (saved) CONTACT_DATA = JSON.parse(saved);
            setTimeout(updateCardUI, 500);
        }

        window.toggleView = (view) => {
            document.getElementById('cardView').classList.add('hidden-view');
            document.getElementById('loginView').classList.add('hidden-view');
            document.getElementById('editView').classList.add('hidden-view');
            if (view === 'edit') document.getElementById('editView').classList.remove('hidden-view');
            else if (view === 'login') document.getElementById('loginView').classList.remove('hidden-view');
            else document.getElementById('cardView').classList.remove('hidden-view');
            window.scrollTo(0,0);
        };

        document.getElementById('authBtn').onclick = () => window.toggleView('login');
        
        document.getElementById('doLogin').onclick = () => {
            if (document.getElementById('loginPass').value === CONTACT_DATA.adminPassword) {
                loadEditForm();
                window.toggleView('edit');
                document.getElementById('loginPass').value = "";
            } else {
                alert("Incorrect password");
            }
        };

        document.getElementById('logoutBtn').onclick = () => window.toggleView('card');

        window.removeParent = (btn) => btn.parentElement.remove();

        function createPhoneItem(val = "") {
            const div = document.createElement('div');
            div.className = "flex gap-2 items-center";
            div.innerHTML = `
                <input type="text" value="${val}" class="phone-input flex-1 p-2 border rounded text-sm" placeholder="+251...">
                <button class="text-red-400 hover:text-red-600 px-2" onclick="removeParent(this)">×</button>
            `;
            return div;
        }

        function createSocialItem(platform = "linkedin", url = "") {
            const div = document.createElement('div');
            div.className = "p-3 bg-gray-50 rounded-xl border border-gray-100 space-y-2 relative";
            let options = Object.entries(PLATFORMS).map(([key, info]) => 
                `<option value="${key}" ${key === platform ? 'selected' : ''}>${info.label}</option>`
            ).join('');
            
            div.innerHTML = `
                <button class="absolute top-1 right-1 text-red-400 px-2" onclick="removeParent(this)">×</button>
                <select class="social-platform w-full p-2 border rounded text-xs font-bold">${options}</select>
                <input type="text" value="${url}" class="social-url w-full p-2 border rounded text-xs" placeholder="Profile URL">
            `;
            return div;
        }

        function createCustomLinkItem(label = "", url = "") {
            const div = document.createElement('div');
            div.className = "p-3 bg-gray-50 rounded-xl border border-gray-100 space-y-2 relative";
            div.innerHTML = `
                <button class="absolute top-1 right-1 text-red-400 px-2" onclick="removeParent(this)">×</button>
                <input type="text" value="${label}" class="custom-label w-full p-2 border rounded text-sm font-bold" placeholder="Label">
                <input type="text" value="${url}" class="custom-url w-full p-2 border rounded text-xs" placeholder="URL">
            `;
            return div;
        }

        document.getElementById('addPhone').onclick = () => document.getElementById('phonesEditor').appendChild(createPhoneItem());
        document.getElementById('addSocial').onclick = () => document.getElementById('socialsEditor').appendChild(createSocialItem());
        document.getElementById('addCustomLink').onclick = () => document.getElementById('customLinksEditor').appendChild(createCustomLinkItem());

        let tempImageBase64 = null;

        function loadEditForm() {
            document.getElementById('editName').value = CONTACT_DATA.name || "";
            document.getElementById('editOrg').value = CONTACT_DATA.organization || "";
            document.getElementById('editTitle').value = CONTACT_DATA.title || "";
            document.getElementById('editEmail').value = CONTACT_DATA.email || "";
            document.getElementById('editWebsite').value = CONTACT_DATA.website || "";
            document.getElementById('editLocation').value = CONTACT_DATA.location || "";
            document.getElementById('editPassword').value = CONTACT_DATA.adminPassword || "";
            document.getElementById('editImagePreview').src = CONTACT_DATA.image || "";
            
            document.getElementById('phonesEditor').innerHTML = "";
            (CONTACT_DATA.phones || []).forEach(p => document.getElementById('phonesEditor').appendChild(createPhoneItem(p)));

            document.getElementById('socialsEditor').innerHTML = "";
            (CONTACT_DATA.socialLinks || []).forEach(s => document.getElementById('socialsEditor').appendChild(createSocialItem(s.platform, s.url)));

            document.getElementById('customLinksEditor').innerHTML = "";
            (CONTACT_DATA.customLinks || []).forEach(l => document.getElementById('customLinksEditor').appendChild(createCustomLinkItem(l.label, l.url)));
        }

        document.getElementById('imageUpload').onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    tempImageBase64 = event.target.result;
                    document.getElementById('editImagePreview').src = tempImageBase64;
                };
                reader.readAsDataURL(file);
            }
        };

        document.getElementById('saveEdit').onclick = async () => {
            const upData = {
                ...CONTACT_DATA,
                name: document.getElementById('editName').value.trim(),
                organization: document.getElementById('editOrg').value.trim(),
                title: document.getElementById('editTitle').value.trim(),
                email: document.getElementById('editEmail').value.trim(),
                website: document.getElementById('editWebsite').value.trim(),
                location: document.getElementById('editLocation').value.trim(),
                adminPassword: document.getElementById('editPassword').value.trim() || CONTACT_DATA.adminPassword,
                phones: Array.from(document.querySelectorAll('.phone-input')).map(i => i.value.trim()).filter(v => v),
                socialLinks: Array.from(document.querySelectorAll('#socialsEditor > div')).map(div => ({
                    platform: div.querySelector('.social-platform').value,
                    url: div.querySelector('.social-url').value.trim()
                })).filter(s => s.url),
                customLinks: Array.from(document.querySelectorAll('#customLinksEditor > div')).map(div => ({
                    label: div.querySelector('.custom-label').value.trim(),
                    url: div.querySelector('.custom-url').value.trim()
                })).filter(l => l.label && l.url)
            };

            if (tempImageBase64) {
                upData.image = tempImageBase64;
                tempImageBase64 = null;
            }

            if (db) {
                try {
                    await setDoc(doc(db, 'profiles', appIdPrefix), upData);
                    alert("Changes saved to cloud!");
                    window.toggleView('card');
                } catch (err) {
                    alert("Failed to save to cloud. Saved locally instead.");
                    localStorage.setItem('dema_hope_local_storage', JSON.stringify(upData));
                    CONTACT_DATA = upData;
                    updateCardUI();
                    window.toggleView('card');
                }
            } else {
                localStorage.setItem('dema_hope_local_storage', JSON.stringify(upData));
                CONTACT_DATA = upData;
                updateCardUI();
                alert("Changes saved locally!");
                window.toggleView('card');
            }
        };

        document.getElementById('downloadButton').onclick = () => {
            const el = document.getElementById('id-card-content');
            html2canvas(el, { scale: 2, useCORS: true, allowTaint: true }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Card_${CONTACT_DATA.name}.png`;
                link.href = canvas.toDataURL();
                link.click();
            });
        };

        document.getElementById('vcfButton').onclick = () => {
            let vcf = `BEGIN:VCARD\nVERSION:3.0\nFN:${CONTACT_DATA.name}\nORG:${CONTACT_DATA.organization}\n`;
            (CONTACT_DATA.phones || []).forEach(p => vcf += `TEL:${p}\n`);
            vcf += `EMAIL:${CONTACT_DATA.email}\nURL:${CONTACT_DATA.website}\nEND:VCARD`;
            const blob = new Blob([vcf], { type: 'text/vcard' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `${CONTACT_DATA.name}.vcf`;
            link.click();
        };
    </script>
</body>
</html>
