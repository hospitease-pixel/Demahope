<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Dema Hope - Digital Business Card</title>
    
    <meta property="og:title" content="Dema Hope - Digital Business Card" />
    <meta property="og:description" content="Digital Business Card for Dema Hope Real Estate." />
    <meta property="og:image" content="https://i.ibb.co/TMPW18jq/5855174764425579512.png" /> 
    <meta property="og:type" content="website" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .contact-btn { transition: all 0.2s; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .contact-btn:active { transform: scale(0.98); }
        .wave-background { background-color: #ffffff; position: relative; overflow: hidden; z-index: 1; border-bottom: 5px solid #3b82f6; }
        .graph-pattern-background { background-color: #ffffff; }
        .strip-decoration { position: absolute; width: 450px; height: 10px; background-color: #1f2937; transform: rotate(-45deg); opacity: 1; box-shadow: 0 2px 5px rgba(0,0,0,0.3); pointer-events: none; }
        .strip-ur-1 { top: -100px; right: -150px; z-index: 0; } 
        .strip-ur-2 { top: -60px; right: -110px; z-index: 0; } 
        .strip-ll-1 { bottom: -100px; left: -150px; z-index: 5; } 
        .strip-ll-2 { bottom: -60px; left: -110px; z-index: 5; }
        
        /* Social Brand Colors */
        .icon-facebook { background-color: #1877F2; color: white; }
        .icon-linkedin { background-color: #0A66C2; color: white; }
        .icon-telegram { background-color: #26A5E4; color: white; }
        .icon-whatsapp { background-color: #25D366; color: white; } 
        .icon-tiktok { background-color: #000000; color: white; } 
        .icon-youtube { background-color: #FF0000; color: white; } 
        .icon-instagram { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #405ded 90%); color: white; } 
        .icon-x-twitter { background-color: #000000; color: white; }
        
        @keyframes rotate { 0% { transform: scale(1.1) rotate(0deg); } 100% { transform: scale(1.1) rotate(360deg); } }
        .animate-watermark { animation: rotate 20s linear infinite; }
        .hidden-view { display: none !important; }
        
        /* Faster Loading: Hide overlay quickly */
        #loadingOverlay { position: fixed; inset: 0; background: #ffffff; display: flex; justify-content: center; align-items: center; z-index: 9999; }
    </style>
</head>
<body class="min-h-screen bg-gray-900 flex flex-col items-center py-4 px-4">

    <!-- Fast Loading Overlay -->
    <div id="loadingOverlay">
        <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-b-2 border-blue-600"></div>
    </div>

    <!-- Controls -->
    <button id="authBtn" class="fixed top-4 right-4 bg-white/20 backdrop-blur-md text-white p-2 rounded-full shadow-lg z-50 hover:bg-white/30">
        <i data-lucide="settings" class="w-5 h-5"></i>
    </button>

    <!-- Card View (Shown by default) -->
    <div id="cardView" class="w-full flex flex-col items-center">
        <div id="id-card-content" class="graph-pattern-background max-w-sm w-full mx-auto p-4 md:p-6 rounded-3xl border-2 border-gray-200 shadow-2xl relative overflow-hidden mb-6">
            <div class="wave-background absolute top-0 left-0 right-0 h-64 -mt-2 -mx-1 rounded-t-[1.5rem]">
                <div class="absolute top-0 left-0 w-full h-full flex justify-center items-center p-4">
                    <img id="businessLogo" src="https://i.ibb.co/TMPW18jq/5855174764425579512.png" alt="Logo" class="w-full h-full object-contain">
                </div>
            </div>
            
            <div class="absolute inset-0 z-0 pointer-events-none flex justify-center items-center" style="top: -5%;">
                <div class="absolute opacity-[0.2] animate-watermark w-full h-full flex justify-center items-center">
                    <img src="https://i.ibb.co/FLxSS6jt/5855174764425579514-1-removebg-preview.png" alt="Watermark" class="w-full h-full object-contain">
                </div>
            </div>

            <div class="strip-decoration strip-ur-1"></div><div class="strip-decoration strip-ur-2"></div>
            <div class="strip-decoration strip-ll-1"></div><div class="strip-decoration strip-ll-2"></div>

            <div class="relative z-10 pt-40"> 
                <div class="text-center mb-6"> 
                    <div class="relative w-32 h-32 mx-auto rounded-full border-4 border-black/80 shadow-xl overflow-hidden bg-white">
                        <img id="profilePicture" src="https://i.ibb.co/KxdB41Yw/590330395-122245334552174394-7170724954983779927-n.jpg" alt="Profile" class="w-full h-full object-cover">
                    </div>
                    <h1 id="display-name" class="text-xl font-extrabold text-gray-900 mt-4">...</h1>
                    <p id="display-org" class="text-lg font-bold text-blue-600">...</p>
                    <p id="display-title" class="text-md font-semibold text-gray-800">...</p>
                    <p class="text-sm italic text-gray-600 mt-1">Elevate your life style | ቅንጦት ይገባዎታል</p>
                </div>

                <div class="mt-4 border-t border-b border-gray-100 py-4">
                    <div id="social-container" class="flex flex-wrap justify-center gap-3"></div>
                </div>

                <div id="phone-buttons-container" class="space-y-3 mt-6"></div>
                <div id="contact-buttons-container" class="space-y-3 mt-3"></div>
                <div id="custom-links-container" class="space-y-3 mt-3"></div>

                <div class="mt-6 flex gap-2">
                    <a href="#" target="_blank" id="btn-website" class="flex-1 flex items-center justify-center p-3 bg-gray-100 rounded-lg text-sm font-bold"><i data-lucide="globe" class="w-4 h-4 mr-2"></i>Website</a>
                    <a href="#" target="_blank" id="btn-location" class="flex-1 flex items-center justify-center p-3 bg-gray-100 rounded-lg text-sm font-bold"><i data-lucide="map-pin" class="w-4 h-4 mr-2"></i>Location</a>
                </div>

                <div class="mt-8 space-y-3 pb-4">
                    <button id="downloadButton" class="w-full flex items-center justify-center p-4 bg-blue-600 text-white font-bold rounded-xl shadow-lg">Download Card</button>
                    <button id="vcfButton" class="w-full flex items-center justify-center p-4 bg-black text-white font-bold rounded-xl shadow-lg">Save Contact</button>
                </div>
            </div> 
        </div>
    </div>

    <!-- Login View -->
    <div id="loginView" class="hidden-view max-w-sm w-full bg-white p-8 rounded-3xl shadow-2xl mt-10">
        <h2 class="text-xl font-bold mb-4">Admin Login</h2>
        <input type="password" id="loginPass" placeholder="Password" class="w-full px-4 py-3 border rounded-xl mb-4">
        <button id="doLogin" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">Sign In</button>
        <button onclick="toggleView('card')" class="w-full mt-2 text-gray-500 text-sm">Cancel</button>
    </div>

    <!-- Edit View -->
    <div id="editView" class="hidden-view max-w-4xl w-full bg-white p-6 rounded-3xl shadow-2xl my-4 overflow-y-auto">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold">Edit Profile</h2>
            <button onclick="toggleView('card')" class="text-gray-500">Close</button>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-3">
                <label class="text-xs font-bold text-gray-400">IDENTITY</label>
                <input type="file" id="imageUpload" accept="image/*" class="w-full text-xs">
                <input type="text" id="editName" placeholder="Full Name" class="w-full p-2 border rounded">
                <input type="text" id="editOrg" placeholder="Organization" class="w-full p-2 border rounded">
                <input type="text" id="editTitle" placeholder="Job Title" class="w-full p-2 border rounded">
                <input type="email" id="editEmail" placeholder="Email" class="w-full p-2 border rounded">
                <input type="text" id="editWebsite" placeholder="Website" class="w-full p-2 border rounded">
                <input type="text" id="editLocation" placeholder="Location URL" class="w-full p-2 border rounded">
            </div>

            <div class="space-y-4">
                <div>
                    <div class="flex justify-between mb-2">
                        <span class="text-xs font-bold text-gray-400">PHONE NUMBERS</span>
                        <button id="addPhone" class="text-blue-600 text-xs">+ ADD</button>
                    </div>
                    <div id="phonesEditor" class="space-y-2"></div>
                </div>
                <div>
                    <div class="flex justify-between mb-2">
                        <span class="text-xs font-bold text-gray-400">SOCIAL LINKS</span>
                        <button id="addSocial" class="text-blue-600 text-xs">+ ADD</button>
                    </div>
                    <div id="socialsEditor" class="space-y-2"></div>
                </div>
            </div>
        </div>

        <button id="saveEdit" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold mt-8">Save Changes</button>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, doc, setDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        const PLATFORMS = {
            linkedin: { label: 'LinkedIn', icon: 'fa-linkedin', class: 'icon-linkedin' },
            instagram: { label: 'Instagram', icon: 'fa-instagram', class: 'icon-instagram' },
            facebook: { label: 'Facebook', icon: 'fa-facebook', class: 'icon-facebook' },
            tiktok: { label: 'TikTok', icon: 'fa-tiktok', class: 'icon-tiktok' },
            telegram: { label: 'Telegram', icon: 'fa-telegram', class: 'icon-telegram' },
            youtube: { label: 'YouTube', icon: 'fa-youtube', class: 'icon-youtube' },
            x: { label: 'X / Twitter', icon: 'fa-x-twitter', class: 'icon-x-twitter' }
        };

        let CONTACT_DATA = {
            adminPassword: "Admin",
            name: "Dema Hope",
            organization: "Dema Hope real estate", 
            title: "Chief Executive Officer",
            image: "https://i.ibb.co/KxdB41Yw/590330395-122245334552174394-7170724954983779927-n.jpg",
            phones: ["+251951515174"],
            email: "contact@demahope.com",
            whatsapp: "251951515111",
            website: "https://demahoperealestate.com/",
            location: "https://maps.app.goo.gl/66vQJ5azkoYCMTHJA",
            socialLinks: [
                { platform: 'linkedin', url: 'https://et.linkedin.com/company/demahoperealestate' },
                { platform: 'instagram', url: 'https://www.instagram.com/demahoperealestate' },
                { platform: 'facebook', url: 'https://www.facebook.com/demahoperealestatee' },
                { platform: 'tiktok', url: 'https://vm.tiktok.com/ZMHTSWFmNKxNR-PNDd6/' },
                { platform: 'telegram', url: 'https://t.me/demahope' }
            ],
            customLinks: []
        };

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'dema-hope-card';

        function updateCardUI() {
            document.getElementById('display-name').textContent = CONTACT_DATA.name;
            document.getElementById('display-org').textContent = CONTACT_DATA.organization;
            document.getElementById('display-title').textContent = CONTACT_DATA.title;
            document.getElementById('profilePicture').src = CONTACT_DATA.image;
            document.getElementById('btn-website').href = CONTACT_DATA.website || '#';
            document.getElementById('btn-location').href = CONTACT_DATA.location || '#';
            
            // Phone Buttons
            const phoneContainer = document.getElementById('phone-buttons-container');
            phoneContainer.innerHTML = (CONTACT_DATA.phones || []).map(num => `
                <a href="tel:${num.trim()}" class="contact-btn flex items-center justify-center p-3 bg-blue-600 text-white font-semibold rounded-lg">
                    <i data-lucide="phone" class="w-5 h-5 mr-2"></i>Call: ${num.trim()}
                </a>
            `).join('');

            // Core Actions
            const btnContainer = document.getElementById('contact-buttons-container');
            let actions = "";
            if(CONTACT_DATA.email) actions += `<a href="mailto:${CONTACT_DATA.email}" class="contact-btn flex items-center justify-center p-3 bg-red-600 text-white font-semibold rounded-lg"><i data-lucide="mail" class="w-5 h-5 mr-2"></i>Send Email</a>`;
            if(CONTACT_DATA.whatsapp) actions += `<a href="https://wa.me/${CONTACT_DATA.whatsapp}" target="_blank" class="contact-btn flex items-center justify-center p-3 icon-whatsapp font-semibold rounded-lg"><i class="fa-brands fa-whatsapp text-2xl mr-2"></i>WhatsApp</a>`;
            btnContainer.innerHTML = actions;

            // Socials
            const socialContainer = document.getElementById('social-container');
            socialContainer.innerHTML = (CONTACT_DATA.socialLinks || []).map(social => {
                const p = PLATFORMS[social.platform];
                return p ? `<a href="${social.url}" target="_blank" class="w-10 h-10 flex items-center justify-center rounded-full shadow-md ${p.class}"><i class="fa-brands ${p.icon} text-xl"></i></a>` : "";
            }).join('');

            lucide.createIcons();
            // Hide loader as soon as UI is ready
            document.getElementById('loadingOverlay').classList.add('hidden-view');
        }

        // Global functions
        window.toggleView = (view) => {
            ['cardView', 'loginView', 'editView'].forEach(id => document.getElementById(id).classList.add('hidden-view'));
            document.getElementById(view + 'View').classList.remove('hidden-view');
        };

        // Initialize App
        updateCardUI(); // Show default data immediately

        onAuthStateChanged(auth, (user) => {
            if (user) {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'profile', 'main');
                onSnapshot(docRef, (snap) => {
                    if (snap.exists()) {
                        CONTACT_DATA = { ...CONTACT_DATA, ...snap.data() };
                        updateCardUI();
                    }
                });
            } else {
                signInAnonymously(auth);
            }
        });

        // Edit Mode Logic
        document.getElementById('authBtn').onclick = () => window.toggleView('login');
        document.getElementById('doLogin').onclick = () => {
            if (document.getElementById('loginPass').value === CONTACT_DATA.adminPassword) {
                loadEditForm();
                window.toggleView('edit');
            } else alert("Access Denied");
        };

        function createPhoneItem(val = "") {
            const d = document.createElement('div');
            d.className = "flex gap-2";
            d.innerHTML = `<input type="text" value="${val}" class="phone-input flex-1 p-2 border rounded text-sm"><button onclick="this.parentElement.remove()" class="text-red-500">×</button>`;
            return d;
        }

        function createSocialItem(plat = "facebook", url = "") {
            const d = document.createElement('div');
            d.className = "p-2 bg-gray-50 rounded space-y-1 relative";
            let opts = Object.entries(PLATFORMS).map(([k,v]) => `<option value="${k}" ${k===plat?'selected':''}>${v.label}</option>`).join('');
            d.innerHTML = `<select class="social-platform w-full p-1 text-xs">${opts}</select>
                           <input type="text" value="${url}" placeholder="URL" class="social-url w-full p-1 text-xs border rounded">
                           <button onclick="this.parentElement.remove()" class="absolute top-0 right-1 text-red-500">×</button>`;
            return d;
        }

        function loadEditForm() {
            document.getElementById('editName').value = CONTACT_DATA.name;
            document.getElementById('editOrg').value = CONTACT_DATA.organization;
            document.getElementById('editTitle').value = CONTACT_DATA.title;
            document.getElementById('editEmail').value = CONTACT_DATA.email;
            document.getElementById('editWebsite').value = CONTACT_DATA.website;
            document.getElementById('editLocation').value = CONTACT_DATA.location;
            
            const pEditor = document.getElementById('phonesEditor');
            pEditor.innerHTML = "";
            (CONTACT_DATA.phones || []).forEach(p => pEditor.appendChild(createPhoneItem(p)));
            
            const sEditor = document.getElementById('socialsEditor');
            sEditor.innerHTML = "";
            (CONTACT_DATA.socialLinks || []).forEach(s => sEditor.appendChild(createSocialItem(s.platform, s.url)));
        }

        document.getElementById('addPhone').onclick = () => document.getElementById('phonesEditor').appendChild(createPhoneItem());
        document.getElementById('addSocial').onclick = () => document.getElementById('socialsEditor').appendChild(createSocialItem());

        document.getElementById('saveEdit').onclick = async () => {
            const phones = Array.from(document.querySelectorAll('.phone-input')).map(i => i.value.trim()).filter(v => v);
            const socials = Array.from(document.querySelectorAll('#socialsEditor > div')).map(d => ({
                platform: d.querySelector('.social-platform').value,
                url: d.querySelector('.social-url').value.trim()
            })).filter(s => s.url);

            const up = {
                ...CONTACT_DATA,
                name: document.getElementById('editName').value,
                organization: document.getElementById('editOrg').value,
                title: document.getElementById('editTitle').value,
                email: document.getElementById('editEmail').value,
                website: document.getElementById('editWebsite').value,
                location: document.getElementById('editLocation').value,
                phones: phones,
                socialLinks: socials
            };

            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'profile', 'main'), up);
            window.toggleView('card');
        };

        // Actions
        document.getElementById('vcfButton').onclick = () => {
            let v = `BEGIN:VCARD\nVERSION:3.0\nFN:${CONTACT_DATA.name}\nORG:${CONTACT_DATA.organization}\nTITLE:${CONTACT_DATA.title}\n`;
            (CONTACT_DATA.phones || []).forEach(p => v += `TEL:${p}\n`);
            v += `EMAIL:${CONTACT_DATA.email}\nEND:VCARD`;
            const b = new Blob([v], {type:'text/vcard'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(b);
            a.download = "contact.vcf";
            a.click();
        };

        document.getElementById('downloadButton').onclick = () => {
            html2canvas(document.getElementById('id-card-content'), { useCORS: true }).then(c => {
                const l = document.createElement('a');
                l.download = "business_card.png";
                l.href = c.toDataURL();
                l.click();
            });
        };
    </script>
</body>
</html>
