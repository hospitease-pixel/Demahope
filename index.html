<html lang="en">
<head>

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .contact-btn {
            transition: all 0.2s;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.06);
        }
        .contact-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        .wave-background {
            background-color: #ffffff; 
            position: relative; 
            overflow: hidden; 
            z-index: 1; 
            border-bottom: 5px solid #3b82f6; 
        }

        .graph-pattern-background {
            background-color: #ffffff; 
        }

        .strip-decoration {
            position: absolute;
            width: 450px; 
            height: 10px; 
            background-color: #1f2937;
            transform: rotate(-45deg); 
            opacity: 1; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        .strip-ur-1 { top: -100px; right: -150px; z-index: 0; } 
        .strip-ur-2 { top: -60px; right: -110px; z-index: 0; } 
        .strip-ur-3 { top: -20px; right: -70px; z-index: 0; } 
        .strip-ll-1 { bottom: -100px; left: -150px; z-index: 5; } 
        .strip-ll-2 { bottom: -60px; left: -110px; z-index: 5; } 
        .strip-ll-3 { bottom: -20px; left: -70px; z-index: 5; }

        .icon-facebook { background-color: #1877F2; color: white; }
        .icon-linkedin { background-color: #0A66C2; color: white; }
        .icon-telegram { background-color: #26A5E4; color: white; }
        .icon-whatsapp { background-color: #000000; color: white; } 
        .icon-tiktok { background-color: #000000; color: white; } 
        .icon-youtube { background-color: #FF0000; color: white; } 
        
        .icon-instagram { 
            background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #405ded 90%);
            color: white; 
        } 

        .icon-facebook:hover { background-color: #166EDF; }
        .icon-linkedin:hover { background-color: #004D99; }
        .icon-telegram:hover { background-color: #1B88B9; }
        .icon-whatsapp:hover { background-color: #333333; } 
        .icon-instagram:hover { 
            background: radial-gradient(circle at 30% 107%, #ffe082 0%, #ffe082 5%, #ff4d3d 45%, #c01e8c 60%, #3a4ee0 90%);
        }
        .icon-tiktok:hover { background-color: #333333; }
        .icon-youtube:hover { background-color: #CC0000; }

        @keyframes rotate {
            0% { transform: scale(1.1) rotate(0deg); }
            100% { transform: scale(1.1) rotate(360deg); } 
        }
        .animate-watermark {
            animation: rotate 20s linear infinite;
        }

        .is-capturing * {
            transition: none !important;
            animation: none !important;
        }
        
        #id-card-content.is-capturing {
            transform: none !important; 
            position: relative !important; 
        }

        .profile-container {
            z-index: 20; 
            position: relative; 
        }
        
        #profilePicture {
            transform: scale(1.05); 
            transition: transform 0.3s ease-in-out; 
            object-position: 50% 50%; 
        }
    </style>
</head>
<body class="min-h-screen p-4 py-8 bg-gray-900 flex justify-center items-start">

    <div id="messageBox" class="fixed top-4 left-1/2 -translate-x-1/2 p-3 bg-gray-100 text-gray-700 rounded-lg text-sm text-center hidden z-50 transition-all duration-300 shadow-xl">

    </div>

    <div id="id-card-content" 
          class="graph-pattern-background max-w-sm w-full mx-auto p-4 md:p-6 rounded-3xl

                 shadow-[0_15px_30px_-5px_rgba(0,0,0,0.7)] 
                 transform transition-transform duration-500 hover:scale-[1.01] 
                 relative overflow-hidden">
        
        <div class="wave-background absolute top-0 left-0 right-0 h-64 -mt-2 -mx-1 rounded-t-[1.5rem]">
            <div class="absolute top-0 left-0 w-full h-full flex justify-center items-center" style="top: -10%;">
                <img id="businessLogo" 
                    src="https://i.ibb.co/TMPW18jq/5855174764425579512.png" 
                    alt="Dema Hope Real Estate Logo" 
                    class="w-[90%] h-[90%] object-contain transition-opacity duration-300"
                    onerror="this.onerror=null; this.src='https://placehold.co/160x80/1f2937/ffffff?text=LOGO';"
                >
            </div>
        </div>

        <div class="absolute inset-0 z-0 pointer-events-none flex justify-center items-center" style="top: -5%;">
            <div class="absolute opacity-[0.30] animate-watermark w-full h-full flex justify-center items-center">
                <img src="https://i.ibb.co/FLxSS6jt/5855174764425579514-1-removebg-preview.png" alt="Dema Hope Watermark" class="w-full h-full object-contain">
            </div>
        </div>

        <div class="strip-decoration strip-ur-1"></div>
        <div class="strip-decoration strip-ur-2"></div>
        <div class="strip-decoration strip-ur-3"></div>
        <div class="strip-decoration strip-ll-1"></div>
        <div class="strip-decoration strip-ll-2"></div>
        <div class="strip-decoration strip-ll-3"></div>

        <div class="relative z-10"> 
            <div class="text-center mb-6 pt-36"> 
                <div class="relative w-40 h-40 mx-auto rounded-full border-8 border-black/60 shadow-xl overflow-hidden profile-container">
                    <img 
                        id="profilePicture" 
                        src="https://i.ibb.co/KxdB41Yw/590330395-122245334552174394-7170724954983779927-n.jpg" 
                        alt="Dema Hope Profile Picture" 
                        class="w-full h-full rounded-full object-cover"
                        onerror="this.onerror=null; this.src='https://placehold.co/160x160/3b82f6/ffffff?text=ID';"
                    >
                </div>
                
                <h1 id="contactName" class="text-xl font-extrabold text-gray-900 mt-4">Dema Hope</h1>
                <p id="contactOrg" class="text-xl font-semibold text-blue-600 mt-1">Dema Hope real estate</p>
                <p id="contactTitle" class="text-lg font-bold text-gray-900 mt-2">Chief Executive Officer</p>
                <p class="text-base italic text-gray-700 mt-1">Elevate your life style</p>
                <p class="text-base italic text-gray-700 mt-1">ቅንጦት ይገባዎታል</p>
            </div>

            <div class="space-y-3 mt-8">
                <h2 class="text-lg font-bold text-gray-700 mb-2 border-b pb-2">Primary Contact</h2>
                
                <a href="tel:+251951515174" id="contactPhoneLink" class="contact-btn flex items-center justify-center p-3 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700">
                    <i data-lucide="phone" class="w-5 h-5 mr-2"></i>
                    Call: 0951515174
                </a>
                
                <a href="https://wa.me/251951515111" target="_blank" id="contactWhatsappLink" class="contact-btn flex items-center justify-center p-3 font-semibold rounded-lg shadow-lg icon-whatsapp">
                    <i class="fa-brands fa-whatsapp text-2xl mr-2"></i>
                    WhatsApp
                </a>

                <a href="sms:+251951515174" class="contact-btn flex items-center justify-center p-3 bg-black text-white font-semibold rounded-lg hover:bg-gray-800">
                    <i data-lucide="message-square-text" class="w-5 h-5 mr-2"></i>
                    Send SMS
                </a>
            </div>
            
            <div class="mt-6 border-t pt-6 border-gray-200">
                <h2 class="text-lg font-bold text-gray-700 mb-3">Links & Social Media</h2>
                
                <div class="grid grid-cols-1 gap-3 mb-6">
                    <a href="https://demahoperealestate.com/" target="_blank" class="contact-btn flex items-center justify-center p-3 bg-gray-200 text-gray-800 font-semibold rounded-lg hover:bg-gray-300">
                        <i data-lucide="globe" class="w-5 h-5 mr-2"></i>
                        Website
                    </a>
                    <a href="https://maps.app.goo.gl/66vQJ5azkoYCMTHJA" target="_blank" class="contact-btn flex items-center justify-center p-3 bg-gray-200 text-gray-800 font-semibold rounded-lg hover:bg-gray-300">
                        <i data-lucide="map-pin" class="w-5 h-5 mr-2"></i>
                        Location
                    </a>
                    <a href="https://share.google/UHPioNJukeWkHtDaS" target="_blank" class="contact-btn flex items-center justify-center p-3 bg-gray-200 text-gray-800 font-semibold rounded-lg hover:bg-gray-300">
                        <i data-lucide="building-2" class="w-5 h-5 mr-2"></i>
                        Properties
                    </a>
                </div>

                <div class="flex flex-wrap justify-center gap-4"> 
                    <a href="https://et.linkedin.com/company/demahoperealestate" target="_blank" class="inline-flex items-center justify-center w-12 h-12 rounded-full transition duration-300 transform hover:scale-110 shadow-lg icon-linkedin">
                        <i class="fa-brands fa-linkedin text-2xl"></i>
                    </a>
                    <a href="https://www.instagram.com/demahoperealestate" target="_blank" class="inline-flex items-center justify-center w-12 h-12 rounded-full transition duration-300 transform hover:scale-110 shadow-lg icon-instagram">
                        <i class="fa-brands fa-instagram text-2xl"></i>
                    </a>
                    <a href="https://www.facebook.com/demahoperealestatee" target="_blank" class="inline-flex items-center justify-center w-12 h-12 rounded-full transition duration-300 transform hover:scale-110 shadow-lg icon-facebook">
                        <i class="fa-brands fa-facebook text-2xl"></i>
                    </a>
                    <a href="https://vm.tiktok.com/ZMHTSWFmNKxNR-PNDd6/" target="_blank" class="inline-flex items-center justify-center w-12 h-12 rounded-full transition duration-300 transform hover:scale-110 shadow-lg icon-tiktok">
                        <i class="fa-brands fa-tiktok text-2xl"></i>
                    </a>
                    <a href="https://t.me/demahope" target="_blank" class="inline-flex items-center justify-center w-12 h-12 rounded-full transition duration-300 transform hover:scale-110 shadow-lg icon-telegram">
                        <i class="fa-brands fa-telegram text-2xl"></i>
                    </a>
                </div>
            </div>

            <div class="mt-8 space-y-3">
                <button id="downloadButton" class="w-full flex items-center justify-center p-4 bg-blue-600 text-white font-bold rounded-xl shadow-xl hover:bg-blue-700 transition duration-300">
                    <i data-lucide="download" class="w-6 h-6 mr-2"></i>
                    Download Card Image
                </button>

                <button id="vcfButton" class="w-full flex items-center justify-center p-4 bg-black text-white font-bold rounded-xl shadow-xl hover:bg-gray-800 transition duration-300">
                    <i data-lucide="address-book" class="w-6 h-6 mr-2"></i>
                    Add to Contact (.vcf)
                </button>
            </div>
        </div> 
    </div>

    <script>
        lucide.createIcons();

        const messageBox = document.getElementById('messageBox');
        
        function showMessage(text, isError = false) {
            messageBox.textContent = text;
            messageBox.className = 'fixed top-4 left-1/2 -translate-x-1/2 p-3 rounded-lg text-sm text-center z-50 shadow-xl ' + 
                                (isError ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700');
            messageBox.classList.remove('hidden');
            setTimeout(() => messageBox.classList.add('hidden'), 4000);
        }

        document.getElementById('downloadButton').addEventListener('click', () => {
            const cardElement = document.getElementById('id-card-content');
            const downloadButton = document.getElementById('downloadButton'); 
            const vcfButton = document.getElementById('vcfButton');
            
            showMessage('Generating card image...'); 

            downloadButton.style.visibility = 'hidden';
            vcfButton.style.visibility = 'hidden';
            cardElement.classList.add('is-capturing');

            setTimeout(() => {
                html2canvas(cardElement, {
                    scale: 2,
                    useCORS: true,
                    backgroundColor: null
                }).then(canvas => {
                    downloadButton.style.visibility = 'visible';
                    vcfButton.style.visibility = 'visible';
                    cardElement.classList.remove('is-capturing');

                    const link = document.createElement('a');
                    link.href = canvas.toDataURL('image/png');
                    link.download = 'Dema_Hope_Digital_Card.png';
                    link.click();
                    showMessage('Downloaded successfully!');
                }).catch(err => {
                    downloadButton.style.visibility = 'visible';
                    vcfButton.style.visibility = 'visible';
                    cardElement.classList.remove('is-capturing');
                    showMessage('Error generating image', true);
                });
            }, 500);
        });

        const CONTACT_DATA = {
            name: "Dema Hope",
            organization: "Dema Hope real estate", 
            title: "Chief Executive Officer",
            phone: "+251951515174",
            whatsapp: "+251951515111",
            website: "https://demahoperealestate.com/",
            location: "https://maps.app.goo.gl/66vQJ5azkoYCMTHJA",
            properties: "https://share.google/UHPioNJukeWkHtDaS",
            socials: {
                linkedin: "https://et.linkedin.com/company/demahoperealestate",
                instagram: "https://www.instagram.com/demahoperealestate",
                facebook: "https://www.facebook.com/demahoperealestatee",
                tiktok: "https://vm.tiktok.com/ZMHTSWFmNKxNR-PNDd6/",
                telegram: "https://t.me/demahope"
            }
        };

        document.getElementById('vcfButton').addEventListener('click', () => {
            // Build the vCard string
            let vcf = "BEGIN:VCARD\n";
            vcf += "VERSION:3.0\n";
            vcf += `FN:${CONTACT_DATA.name}\n`;
            vcf += `N:Hope;Dema;;;\n`;
            vcf += `ORG:${CONTACT_DATA.organization}\n`;
            vcf += `TITLE:${CONTACT_DATA.title}\n`;
            vcf += `TEL;TYPE=CELL,VOICE:${CONTACT_DATA.phone}\n`;
            vcf += `TEL;TYPE=WORK,VOICE:${CONTACT_DATA.whatsapp}\n`; 
            
            // Website field (Primary)
            vcf += `URL;TYPE=WORK;LABEL=Website:${CONTACT_DATA.website}\n`;
            
            // Categorized URLs using the LABEL property for descriptive display names
            vcf += `URL;TYPE=WORK;LABEL=Properties:${CONTACT_DATA.properties}\n`;
            vcf += `URL;TYPE=WORK;LABEL=Location:${CONTACT_DATA.location}\n`;
            vcf += `URL;TYPE=WORK;LABEL=LinkedIn:${CONTACT_DATA.socials.linkedin}\n`;
            vcf += `URL;TYPE=WORK;LABEL=Instagram:${CONTACT_DATA.socials.instagram}\n`;
            vcf += `URL;TYPE=WORK;LABEL=Facebook:${CONTACT_DATA.socials.facebook}\n`;
            vcf += `URL;TYPE=WORK;LABEL=TikTok:${CONTACT_DATA.socials.tiktok}\n`;
            vcf += `URL;TYPE=WORK;LABEL=Telegram:${CONTACT_DATA.socials.telegram}\n`;
            
            // Social Profiles (Specific tags for iOS and modern Android)
            vcf += `X-SOCIALPROFILE;TYPE=linkedin:${CONTACT_DATA.socials.linkedin}\n`;
            vcf += `X-SOCIALPROFILE;TYPE=facebook:${CONTACT_DATA.socials.facebook}\n`;
            vcf += `X-SOCIALPROFILE;TYPE=instagram:${CONTACT_DATA.socials.instagram}\n`;
            
            // Note field as fallback directory
            let note = "DIRECTORY OF LINKS:\\n\\n";
            note += `Main Website: ${CONTACT_DATA.website}\\n`;
            note += `Office Location: ${CONTACT_DATA.location}\\n`;
            note += `Property Listings: ${CONTACT_DATA.properties}\\n\\n`;
            note += "SOCIAL MEDIA:\\n";
            note += `LinkedIn: ${CONTACT_DATA.socials.linkedin}\\n`;
            note += `Instagram: ${CONTACT_DATA.socials.instagram}\\n`;
            note += `Facebook: ${CONTACT_DATA.socials.facebook}\\n`;
            note += `TikTok: ${CONTACT_DATA.socials.tiktok}\\n`;
            note += `Telegram: ${CONTACT_DATA.socials.telegram}\\n\\n`;
            note += "Slogan: Elevate your life style ቅንጦት ይገባዎታል";
            
            vcf += `NOTE:${note}\n`;
            vcf += "END:VCARD";
            
            // Create and trigger download
            const blob = new Blob([vcf], { type: 'text/vcard;charset=utf-8' });
            const url = window.URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `${CONTACT_DATA.name.replace(/\s+/g, '_')}_Contact.vcf`;
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            window.URL.revokeObjectURL(url);
            
            showMessage('Contact card (.vcf) with labeled links saved!');
        });
    </script>
</body>
</html>
